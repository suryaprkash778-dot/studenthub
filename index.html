<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteVerse</title>

    <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <h2>📚 NoteVerse</h2>

    <a href="#">🏠 Home</a>
    <a href="#" onclick="toggleSubMenu('notesMenu', event)">📘 Notes</a>
    <div class="submenu" id="notesMenu">
        <a href="#">Semester 1</a>
        <a href="#">Semester 2</a>
    </div>

    <a href="#" onclick="toggleSubMenu('pyqMenu', event)">📄 PYQs</a>
    <div class="submenu" id="pyqMenu">
        <a href="#">Semester 1</a>
        <a href="#">Semester 2</a>
    </div>

    <a href="#" onclick="openAbout()">ℹ️ About</a>
</div>

<!-- TOP BAR -->
<div class="topbar">
    <span class="menu-btn" onclick="toggleSidebar()">☰</span>
    <h3>NoteVerse</h3>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <section class="hero">
        <h1>All Your Notes & PYQs in One Place</h1>
        <p>Free academic resources for students</p>
    </section>

    <section id="pdfViewer">
        <iframe id="pdfFrame"></iframe>
    </section>

</div>

<!-- ABOUT PANEL -->
<div id="aboutPanel" class="about-panel">
    <span onclick="closeAbout()">✖</span>
    <h2>About</h2>
    <p>NoteVerse helps students access notes and PYQs easily.</p>
</div>

<script src="script.js"></script>

</body>
</html>

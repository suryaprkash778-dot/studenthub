<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://d3js.org/d3.v3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/cal-heatmap/3.3.6/cal-heatmap.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/cal-heatmap/3.3.6/cal-heatmap.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo" onclick="showHome()">NoteVerse</div>
        <div class="nav-actions" id="authContainer">
            <a href="#" class="btn-outline" onclick="signInWithGoogle()">Google</a>
            <a href="#" class="btn-primary" onclick="signInWithGithub()">GitHub</a>
        </div>
    </nav>

    <main class="app-container">
        <div id="homeView">
            <h1 class="hero-title">Engineering Journey</h1>
            <button onclick="showCategory(1, 'Notes')">Sem 1 Notes</button>
            <button onclick="showCategory(2, 'Notes')">Sem 2 Notes</button>
        </div>

        <div id="semester1View" style="display: none;">
            <button onclick="showHome()">Back</button>
            <h1 id="sem1TitleType">Notes</h1>
            <div class="vertical-subject-list"></div>
        </div>

        <div id="semester2View" style="display: none;">
            <button onclick="showHome()">Back</button>
            <h1 id="sem2TitleType">Notes</h1>
            <div class="vertical-subject-list"></div>
        </div>

        <section id="pdfViewer" style="display: none;">
            <iframe id="pdfFrame" style="width:100%; height:600px;"></iframe>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Initialize
        const nvSupabaseUrl = 'https://tcijpueblweradmiphpd.supabase.co'; 
        const nvSupabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjaWpwdWVibHdlcmFkbWlwaHBkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMTk5MTIsImV4cCI6MjA5NTU5NTkxMn0._tXpjssqHAlsVWEYcrJdGP28HISZU1tnt2WrOTR3DXY';
        const dbClient = window.supabase.createClient(nvSupabaseUrl, nvSupabaseKey);

        // Navigation
        function hideAllViews() {
            document.querySelectorAll('main > div, section').forEach(el => el.style.display = 'none');
        }
        function showHome() { hideAllViews(); document.getElementById('homeView').style.display = 'block'; }
        
        async function showCategory(semNumber, categoryType) {
            hideAllViews();
            const viewId = (semNumber === 1) ? "semester1View" : "semester2View";
            document.getElementById(viewId).style.display = "block";
            const listContainer = document.querySelector(`#${viewId} .vertical-subject-list`);
            listContainer.innerHTML = "Loading...";

            try {
                const { data, error } = await dbClient
                    .from('course_materials')
                    .select('*')
                    .eq('semester', semNumber)
                    .eq('category', categoryType);

                if (error) throw error;

                listContainer.innerHTML = "";
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'vertical-subject-card';
                    card.onclick = () => openPDF(item.file_url);
                    card.innerHTML = `<h3>${item.title}</h3>`;
                    listContainer.appendChild(card);
                });
            } catch (err) {
                listContainer.innerHTML = "Error loading files. Check console.";
                console.error(err);
            }
        }

        function openPDF(url) {
            hideAllViews();
            const viewer = document.getElementById("pdfViewer");
            viewer.style.display = "block";
            document.getElementById("pdfFrame").src = url;
        }

        async function signInWithGoogle() { await dbClient.auth.signInWithOAuth({ provider: 'google' }); }
        async function signInWithGithub() { await dbClient.auth.signInWithOAuth({ provider: 'github' }); }
    </script>
</body>
</html>
